<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classements F1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Classements F1</h1>
            <nav class="tabs">
                <button class="tab-button active" data-tab="historique">Classement Historique</button>
                <button class="tab-button" data-tab="qualifications">Qualifications</button>
                <button class="tab-button" data-tab="deuxieme-pilote">2ème Pilote</button>
                <button class="tab-button" data-tab="elo">ELO</button>
            </nav>
        </header>

        <div class="tab-content active" id="historique">
            <div class="controls">
                <div class="navigation">
                    <button id="historique-prev">← Précédent</button>
                    <span id="historique-range">1950-1959</span>
                    <button id="historique-next">Suivant →</button>
                </div>
            </div>
            <div class="table-container">
                <table id="historique-table">
                    <thead>
                        <tr>
                            <th>Pilote</th>
                            <th>Rang</th>
                            <th>Points</th>
                            <!-- Les années seront ajoutées dynamiquement -->
                        </tr>
                    </thead>
                    <tbody id="historique-body">
                        <!-- Les données seront ajoutées dynamiquement -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="tab-content" id="qualifications">
            <div class="controls">
                <div class="year-selector">
                    <label for="qualif-year">Année :</label>
                    <select id="qualif-year">
                        <!-- Les années seront ajoutées dynamiquement -->
                    </select>
                </div>
            </div>
            <div class="table-container">
                <table id="qualifications-table">
                    <thead>
                        <tr>
                            <th>Pilote</th>
                            <th>Rang</th>
                            <th>Points</th>
                            <!-- Les colonnes des événements seront ajoutées dynamiquement -->
                        </tr>
                    </thead>
                    <tbody id="qualifications-body">
                        <!-- Les données seront ajoutées dynamiquement -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="tab-content" id="deuxieme-pilote">
            <div class="controls">
                <div class="year-selector">
                    <label for="deuxieme-year">Année :</label>
                    <select id="deuxieme-year">
                        <!-- Les années seront ajoutées dynamiquement -->
                    </select>
                </div>
            </div>
            <div class="table-container">
                <table id="deuxieme-pilote-table">
                    <thead>
                        <tr>
                            <th>Équipe</th>
                            <th>Rang</th>
                            <th>Points</th>
                            <!-- Les colonnes GP seront ajoutées dynamiquement -->
                        </tr>
                    </thead>
                    <tbody id="deuxieme-pilote-body">
                        <!-- Les données seront ajoutées dynamiquement -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="tab-content" id="elo">
            <div class="controls">
                <div class="year-selector">
                    <label for="elo-view">Vue :</label>
                    <select id="elo-view">
                        <option value="driver">Par pilote</option>
                        <option value="race">Par course</option>
                        <option value="age">ELO moyen / âge</option>
                    </select>
                </div>

                <div class="year-selector" id="elo-driver-selector">
                    <label for="elo-driver">Pilote :</label>
                    <select id="elo-driver"></select>
                </div>

                <div class="year-selector" id="elo-year-selector" style="display:none">
                    <label for="elo-year">Année :</label>
                    <select id="elo-year"></select>
                </div>

                <div class="year-selector" id="elo-race-selector" style="display:none">
                    <label for="elo-race">Course :</label>
                    <select id="elo-race"></select>
                </div>
            </div>

            <div class="chart-container" id="elo-age-container" style="display:none">
                <div id="elo-age-chart" class="elo-chart" aria-label="Graphique ELO moyen par âge"></div>
            </div>

            <div class="table-container" id="elo-table-container">
                <table id="elo-table">
                    <thead>
                        <tr id="elo-head-row">
                            <th>Chargement…</th>
                        </tr>
                    </thead>
                    <tbody id="elo-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/historique.js"></script>
    <script src="js/qualifications.js"></script>
    <script src="js/deuxieme_pilote.js"></script>
    <script src="js/elo.js"></script>
</body>
</html>
